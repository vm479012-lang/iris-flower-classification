<!DOCTYPE html>
<html>
<head>
    <title>Iris Flower Classification</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }

        body {
            font-family: Arial;
            min-height: 100vh;
            background: linear-gradient(-45deg, #11998e, #38ef7d, #2193b0, #6dd5ed);
            background-size: 400% 400%;
            animation: gradient 8s ease infinite;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }

        @keyframes gradient {
            0% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
            100% { background-position: 0% 50%; }
        }

        .container {
            background: white;
            padding: 35px;
            border-radius: 20px;
            width: 100%;
            max-width: 500px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
        }

        h2 {
            text-align: center;
            color: #11998e;
            margin-bottom: 20px;
            font-size: 24px;
        }

        label {
            font-weight: bold;
            color: #333;
            display: block;
            margin-bottom: 5px;
        }

        input {
            width: 100%;
            padding: 10px;
            margin-bottom: 15px;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 15px;
        }

        input:focus {
            outline: none;
            border-color: #11998e;
        }

        .sample-btn {
            width: 100%;
            padding: 10px;
            background: #f0f0f0;
            border: 1px dashed #11998e;
            border-radius: 8px;
            color: #11998e;
            font-size: 14px;
            cursor: pointer;
            margin-bottom: 15px;
        }

        .sample-btn:hover { background: #e0f5f0; }

        button[type="submit"] {
            width: 100%;
            padding: 12px;
            background: #11998e;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
        }

        button[type="submit"]:hover { background: #0d7a70; }

        .spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid white;
            border-top: 3px solid transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin: 0 auto;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        .result-section {
            margin-top: 25px;
            text-align: center;
        }

        .prediction {
            font-size: 26px;
            font-weight: bold;
            color: #11998e;
            margin-bottom: 15px;
        }

        .flower-img {
            width: 100%;
            border-radius: 12px;
            margin-bottom: 10px;
            max-height: 250px;
            object-fit: cover;
            border: 3px solid #11998e;
        }

        .flower-img-error {
            display: none;
        }
    </style>
</head>
<body>
    <div class="container">
        <h2>🌸 Iris Flower Classification</h2>

        <button class="sample-btn" onclick="fillSample()">
            🎯 Fill Sample Values (Iris Setosa)
        </button>

        <form method="POST" onsubmit="showSpinner()">
            <label>Sepal Length (cm)</label>
            <input type="number" name="sepal_length" id="sepal_length"
                   value="{{ sepal_length }}"
                   placeholder="e.g. 5.1" step="0.1" required>

            <label>Sepal Width (cm)</label>
            <input type="number" name="sepal_width" id="sepal_width"
                   value="{{ sepal_width }}"
                   placeholder="e.g. 3.5" step="0.1" required>

            <label>Petal Length (cm)</label>
            <input type="number" name="petal_length" id="petal_length"
                   value="{{ petal_length }}"
                   placeholder="e.g. 1.4" step="0.1" required>

            <label>Petal Width (cm)</label>
            <input type="number" name="petal_width" id="petal_width"
                   value="{{ petal_width }}"
                   placeholder="e.g. 0.2" step="0.1" required>

            <button type="submit">
                <span id="btn-text">🔍 Classify Flower</span>
                <div class="spinner" id="spinner"></div>
            </button>
        </form>

        {% if prediction %}
        <div class="result-section">
            <div class="prediction">{{ prediction }}</div>

            {% if flower_image %}
            <img src="{{ url_for('static', filename=flower_image) }}"
                 class="flower-img"
                 alt="{{ prediction }}"
                 onerror="this.src='https://via.placeholder.com/400x250?text=Flower+Image'">
            {% endif %}
        </div>
        {% endif %}
    </div>

    <script>
        function fillSample() {
            document.getElementById('sepal_length').value = '5.1';
            document.getElementById('sepal_width').value = '3.5';
            document.getElementById('petal_length').value = '1.4';
            document.getElementById('petal_width').value = '0.2';
        }

        function showSpinner() {
            document.getElementById('btn-text').style.display = 'none';
            document.getElementById('spinner').style.display = 'block';
        }
    </script>
</body>
</html>
